<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Foto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            margin-top: 30px;
            gap: 20px;
            flex-wrap: wrap;
            display: flex;
            justify-content: center;
        }
        img {
            width: 250px;
            height: 250px;
            border-radius: 10px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <h1>Galery Foto</h1>
    <div class="container">
        <img src="M1887.jpg" alt="foto-sgloro">
        <img src="MP40.jpg" alt="foto-mp40">
        <img src="MP5.jpg" alt="foto-mp5">
        <img src="secar.jpg" alt="foto-scar">
    </div>
</body>
</html>
