<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box flex-grow</title>

    <style>
        body {
            display: flex;
            justify-content: center;
        }

        .container {
            width: 600px;
            height: 150px;
            border: 5px solid blue;
            margin: 30px;
            padding: 5px;
            display: flex;
        }

        .container div {
            background-color: lightblue;
            margin: 5px;
            flex: 1; /* bisa diubah jadi 2, 3, dst */
            text-align: center;
            line-height: 140px;
            font-weight: bold;
        }

        .container .dua {
            flex: 2; /* ini lebih besar dari yang lain */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="satu">1</div>
        <div class="dua">2</div>
        <div class="tiga">3</div>
        <div class="empat">4</div>
    </div>

</body>
</html>
